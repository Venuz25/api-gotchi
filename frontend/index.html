<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mi API-gotchi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFB6C1">
</head>
<body>
    <div class="game-console">
        <header>
            <h1 id="nombre-mascota">Cargando...</h1>
            <div style="background: #fff; border-radius: 20px; display: inline-block; padding: 5px 15px; margin-top: 10px; font-weight: bold; color: #f39c12; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                💰 <span id="coin-counter">0</span>
            </div>
        </header>

        <div class="screen-border">
            <div id="room-background" class="screen">
                <div id="pet-container" class="pet-idle">
                    <div id="pet-avatar">👾</div>
                    <div id="pet-fx"></div> 
                </div>
                
                <div class="dialog-box">
                    <p id="event-log">¡Hola! Listo para jugar.</p>
                </div>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat">
                <span>🍖 Hambre</span>
                <progress id="bar-hambre" value="0" max="100" class="bar-orange"></progress>
            </div>
            <div class="stat">
                <span>💖 Felicidad</span>
                <progress id="bar-felicidad" value="0" max="100" class="bar-pink"></progress>
            </div>
            <div class="stat">
                <span>⚡ Energía</span>
                <progress id="bar-energia" value="0" max="100" class="bar-blue"></progress>
            </div>
        </div>

        </div>

        <div class="controls" id="control-buttons" style="grid-template-columns: repeat(2, 1fr);">
            <button class="btn-eat" onclick="realizarAccion('comprar/pizza')" style="background-color: #f1c40f; color: #333;">🍕 Pizza (30)</button>
            <button class="btn-play" onclick="realizarAccion('comprar/cafe')" style="background-color: #e67e22;">☕ Café (15)</button>
            <button class="btn-eat" onclick="realizarAccion('jugar')" style="background-color: #00b894;">🎮 Jugar (+20)</button>
            <button class="btn-sleep" onclick="realizarAccion('dormir')">💤 Dormir</button>
        </div>
        
        <button id="btn-revive" class="btn-revive" onclick="realizarAccion('reiniciar')" style="display: none;">✨ Revivir a Pixel ✨</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
